<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendar Event Link Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f8fb;
}

.container{
max-width:720px;
}

.link-box{
word-break:break-all;
font-family:monospace;
}

</style>

</head>
<body>

<div class="container py-5">

<h2 class="mb-4">
Calendar Event Link Generator
</h2>

<form id="eventForm">

<div class="mb-3">
<label class="form-label">Event title</label>
<input class="form-control" id="title" required>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Start date</label>
<input type="date" class="form-control" id="startDate" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Start time</label>
<input type="time" class="form-control" id="startTime" required>
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">End date</label>
<input type="date" class="form-control" id="endDate" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">End time</label>
<input type="time" class="form-control" id="endTime" required>
</div>

</div>

<div class="mb-3">

<label class="form-label">Timezone</label>

<select class="form-select" id="timezone">

<option value="UTC">UTC</option>
<option value="Europe/Moscow">Europe/Moscow</option>
<option value="Asia/Almaty" selected>Asia/Almaty</option>
<option value="Asia/Tashkent">Asia/Tashkent</option>
<option value="Asia/Dubai">Asia/Dubai</option>
<option value="Europe/Berlin">Europe/Berlin</option>
<option value="America/New_York">America/New_York</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input class="form-control" id="location">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control" id="description" rows="3"></textarea>
</div>

</form>

<hr>

<h5>Generated link</h5>

<div class="alert alert-light border link-box" id="previewLink">
Fill the form
</div>

<div class="d-flex flex-wrap gap-2">

<button class="btn btn-primary" id="copyBtn" disabled>
Copy link
</button>

<a class="btn btn-success disabled" id="openBtn" target="_blank">
Open Google Calendar
</a>

<button class="btn btn-secondary" id="icsBtn" disabled>
Download ICS
</button>

</div>

<hr>

<div id="previewText" class="text-muted"></div>

</div>

<script>

function formatDate(date,time){

if(!date||!time) return ""

const [y,m,d]=date.split("-")
const [hh,mm]=time.split(":")

return `${y}${m}${d}T${hh}${mm}00`

}

function generateLink(){

const title=document.getElementById("title").value
const location=document.getElementById("location").value
const description=document.getElementById("description").value
const tz=document.getElementById("timezone").value

const start=formatDate(
document.getElementById("startDate").value,
document.getElementById("startTime").value
)

const end=formatDate(
document.getElementById("endDate").value,
document.getElementById("endTime").value
)

if(!title||!start||!end) return

const url=
`https://calendar.google.com/calendar/u/0/r/eventedit?text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${encodeURIComponent(description)}&location=${encodeURIComponent(location)}&ctz=${tz}`

document.getElementById("previewLink").textContent=url

const openBtn=document.getElementById("openBtn")
openBtn.href=url
openBtn.classList.remove("disabled")

document.getElementById("copyBtn").disabled=false
document.getElementById("icsBtn").disabled=false

document.getElementById("previewText").innerHTML=
`
<b>${title}</b><br>
${start} → ${end}<br>
${location}<br>
${tz}
`

return {url,title,start,end,location,description,tz}

}

document.querySelectorAll("input,textarea,select").forEach(el=>{
el.addEventListener("input",generateLink)
})

document.getElementById("copyBtn").onclick=async()=>{

const data=generateLink()

await navigator.clipboard.writeText(data.url)

const btn=document.getElementById("copyBtn")

btn.innerText="Copied!"

setTimeout(()=>btn.innerText="Copy link",1500)

}

document.getElementById("icsBtn").onclick=()=>{

const data=generateLink()

const ics=
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${data.title}
DTSTART;TZID=${data.tz}:${data.start}
DTEND;TZID=${data.tz}:${data.end}
LOCATION:${data.location}
DESCRIPTION:${data.description}
END:VEVENT
END:VCALENDAR`

const blob=new Blob([ics],{type:'text/calendar'})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="event.ics"

a.click()

}

</script>

</body>
</html>
